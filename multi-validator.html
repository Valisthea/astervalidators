<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Validator Portfolio Optimizer - Aster Validators</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e2e8f0;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #14b8a6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #a78bfa;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* Card */
        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Total Portfolio Input */
        .portfolio-input {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: end;
        }

        .input-group {
            position: relative;
        }

        .input-label {
            display: block;
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 16px 80px 16px 16px;
            border-radius: 12px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.8);
            color: #e2e8f0;
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #14b8a6;
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1);
        }

        .input-suffix {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #14b8a6;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .btn-primary {
            padding: 16px 32px;
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(20, 184, 166, 0.4);
        }

        /* Validator Allocation */
        .allocations-container {
            display: grid;
            gap: 15px;
        }

        .allocation-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .allocation-item:hover {
            border-color: rgba(20, 184, 166, 0.4);
            background: rgba(15, 23, 42, 0.8);
        }

        .allocation-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        .validator-select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            font-size: 1rem;
        }

        .percentage-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            font-size: 1rem;
            text-align: center;
        }

        .amount-display {
            padding: 12px 16px;
            background: rgba(20, 184, 166, 0.1);
            border-radius: 8px;
            text-align: right;
            font-weight: 600;
            color: #14b8a6;
        }

        .btn-remove {
            padding: 10px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-remove:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .allocation-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 15px;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 8px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .btn-add {
            width: 100%;
            padding: 16px;
            background: rgba(20, 184, 166, 0.1);
            border: 2px dashed rgba(20, 184, 166, 0.3);
            border-radius: 12px;
            color: #14b8a6;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            background: rgba(20, 184, 166, 0.2);
            border-color: rgba(20, 184, 166, 0.5);
        }

        /* Summary Stats */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(20, 184, 166, 0.15), rgba(13, 148, 136, 0.1));
            border-left: 4px solid #14b8a6;
            border-radius: 12px;
            padding: 20px;
        }

        .summary-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #14b8a6;
        }

        .summary-subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 6px;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Allocation Warning */
        .warning {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #eab308;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #22c55e;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .loading-spinner {
            border: 3px solid rgba(148, 163, 184, 0.2);
            border-top: 3px solid #14b8a6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Comparison Table */
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .comparison-table th {
            background: rgba(20, 184, 166, 0.1);
            color: #14b8a6;
            font-weight: 600;
        }

        .comparison-table tr:hover {
            background: rgba(20, 184, 166, 0.05);
        }

        .highlight {
            color: #14b8a6;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💼 Multi-Validator Portfolio Optimizer</h1>
            <p class="subtitle">Optimize your ASTER staking across multiple validators</p>
            <span class="badge">✨ Advanced Strategy Tool</span>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading validators data...</p>
        </div>

        <!-- Main Content -->
        <div id="app" style="display: none;">
            <!-- Total Portfolio Input -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>💰</span>
                        <span>Total Portfolio</span>
                    </div>
                </div>
                <div class="portfolio-input">
                    <div class="input-group">
                        <label class="input-label">Amount to Stake</label>
                        <div style="position: relative;">
                            <input 
                                type="number" 
                                id="totalAmount" 
                                class="input-field" 
                                value="50000" 
                                min="0" 
                                step="1000"
                            >
                            <span class="input-suffix">ASTER</span>
                        </div>
                        <div id="allocationStatus" style="margin-top: 10px;"></div>
                    </div>
                    <button class="btn-primary" onclick="autoOptimize()">
                        🎯 Auto-Optimize
                    </button>
                </div>
            </div>

            <!-- Allocations -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>📊</span>
                        <span>Validator Allocations</span>
                    </div>
                    <button class="btn-primary" onclick="addAllocation()" style="padding: 10px 20px; font-size: 0.9rem;">
                        ➕ Add Validator
                    </button>
                </div>
                <div id="allocations" class="allocations-container"></div>
            </div>

            <!-- Summary Stats -->
            <div class="summary-grid" id="summaryStats"></div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>🥧</span>
                            <span>Portfolio Distribution</span>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="distributionChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>📈</span>
                            <span>Rewards Breakdown</span>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="rewardsChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Comparison Table -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>📋</span>
                        <span>Detailed Comparison</span>
                    </div>
                </div>
                <table class="comparison-table" id="comparisonTable"></table>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const BASE_POOL = 150000;
        const LOYALTY_POOL = 300000;
        const MAX_LOCK_WEEKS = 208;
        const DEFAULT_LOCK_WEEKS = 52;
        const DEFAULT_VOLUME_BOOST = 1.0;
        const DEFAULT_TX_SHARE = 2.5;
        const NETWORK_TOTAL_POWER = 100000000;

        // State
        let validators = [];
        let allocations = [];
        let charts = {};

        // Load validators
        async function loadValidators() {
            try {
                const { data, error } = await supabase
                    .from('validators')
                    .select('id, name, commission, total_staked, performance_score')
                    .eq('status', 'active')
                    .order('total_staked', { ascending: false });

                if (error) throw error;

                validators = data;
                
                // Initialize with 3 default allocations
                addAllocation();
                addAllocation();
                addAllocation();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                
                calculate();
            } catch (error) {
                console.error('Error loading validators:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #ef4444;">
                        <p>❌ Error loading validators</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Add allocation
        function addAllocation() {
            const id = Date.now();
            allocations.push({
                id,
                validatorId: validators[allocations.length % validators.length].id,
                percentage: 0
            });
            renderAllocations();
            calculate();
        }

        // Remove allocation
        function removeAllocation(id) {
            allocations = allocations.filter(a => a.id !== id);
            renderAllocations();
            calculate();
        }

        // Update allocation
        function updateAllocation(id, field, value) {
            const allocation = allocations.find(a => a.id === id);
            if (allocation) {
                allocation[field] = value;
                calculate();
            }
        }

        // Render allocations
        function renderAllocations() {
            const container = document.getElementById('allocations');
            container.innerHTML = allocations.map(allocation => {
                const validator = validators.find(v => v.id === allocation.validatorId);
                const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 0;
                const amount = (totalAmount * allocation.percentage / 100).toFixed(2);
                
                // Calculate rewards for this allocation
                const rewards = calculateValidatorRewards(validator, parseFloat(amount));
                
                return `
                    <div class="allocation-item">
                        <div class="allocation-header">
                            <select 
                                class="validator-select" 
                                onchange="updateAllocation(${allocation.id}, 'validatorId', this.value)"
                            >
                                ${validators.map(v => `
                                    <option value="${v.id}" ${v.id === allocation.validatorId ? 'selected' : ''}>
                                        ${v.name} (${v.commission}% fee)
                                    </option>
                                `).join('')}
                            </select>
                            <input 
                                type="number" 
                                class="percentage-input" 
                                value="${allocation.percentage}" 
                                min="0" 
                                max="100" 
                                step="1"
                                placeholder="%"
                                oninput="updateAllocation(${allocation.id}, 'percentage', parseFloat(this.value) || 0)"
                            >
                            <div class="amount-display">
                                ${parseFloat(amount).toLocaleString('en-US', {maximumFractionDigits: 0})} ASTER
                            </div>
                            <button class="btn-remove" onclick="removeAllocation(${allocation.id})">
                                🗑️
                            </button>
                        </div>
                        <div class="allocation-details">
                            <div class="detail-item">
                                <div class="detail-label">APY</div>
                                <div class="detail-value" style="color: #14b8a6;">
                                    ${rewards.apy.toFixed(2)}%
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Yearly Rewards</div>
                                <div class="detail-value">
                                    ${rewards.yearly.toLocaleString('en-US', {maximumFractionDigits: 0})}
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Commission</div>
                                <div class="detail-value" style="color: #ef4444;">
                                    ${validator.commission}%
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Performance</div>
                                <div class="detail-value" style="color: #22c55e;">
                                    ${validator.performance_score}%
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') + `
                <button class="btn-add" onclick="addAllocation()">
                    ➕ Add Another Validator
                </button>
            `;
        }

        // Calculate validator rewards
        function calculateValidatorRewards(validator, stakeAmount) {
            if (!stakeAmount || stakeAmount <= 0) {
                return { apy: 0, yearly: 0, weekly: 0 };
            }

            const timeWeight = DEFAULT_LOCK_WEEKS / MAX_LOCK_WEEKS;
            const validatorTxShare = DEFAULT_TX_SHARE / 100;

            // Base Rewards
            const validatorBaseReward = BASE_POOL * validatorTxShare;
            const userStakeRatio = stakeAmount / validator.total_staked;
            const commissionRate = validator.commission / 100;
            const baseRewardPerEpoch = validatorBaseReward * userStakeRatio * (1 - commissionRate);

            // Loyalty Rewards
            const veASTER = stakeAmount * timeWeight;
            const userPower = veASTER * DEFAULT_VOLUME_BOOST;
            const userPowerRatio = userPower / NETWORK_TOTAL_POWER;
            const loyaltyRewardPerEpoch = LOYALTY_POOL * userPowerRatio;

            const totalPerEpoch = baseRewardPerEpoch + loyaltyRewardPerEpoch;
            const yearly = totalPerEpoch * 52;
            const apy = (yearly / stakeAmount) * 100;

            return {
                apy,
                yearly,
                weekly: totalPerEpoch,
                baseReward: baseRewardPerEpoch,
                loyaltyReward: loyaltyRewardPerEpoch
            };
        }

        // Calculate totals
        function calculate() {
            const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 0;
            const totalPercentage = allocations.reduce((sum, a) => sum + a.percentage, 0);

            // Update allocation status
            const statusEl = document.getElementById('allocationStatus');
            if (Math.abs(totalPercentage - 100) < 0.01) {
                statusEl.innerHTML = '<div class="success">✅ Fully allocated (100%)</div>';
            } else if (totalPercentage > 100) {
                statusEl.innerHTML = `<div class="warning">⚠️ Over-allocated (${totalPercentage.toFixed(1)}% > 100%)</div>`;
            } else {
                statusEl.innerHTML = `<div class="warning">⚠️ Under-allocated (${totalPercentage.toFixed(1)}% < 100%)</div>`;
            }

            // Calculate portfolio metrics
            let totalYearlyRewards = 0;
            let weightedAPY = 0;

            const results = allocations.map(allocation => {
                const validator = validators.find(v => v.id === allocation.validatorId);
                const amount = totalAmount * allocation.percentage / 100;
                const rewards = calculateValidatorRewards(validator, amount);
                
                totalYearlyRewards += rewards.yearly;
                weightedAPY += rewards.apy * (allocation.percentage / 100);

                return {
                    ...allocation,
                    validator,
                    amount,
                    rewards
                };
            });

            // Render summary
            renderSummary(totalAmount, weightedAPY, totalYearlyRewards);
            
            // Render charts
            renderCharts(results);
            
            // Render comparison table
            renderComparisonTable(results);
            
            // Re-render allocations to update details
            renderAllocations();
        }

        // Render summary
        function renderSummary(totalAmount, weightedAPY, totalYearlyRewards) {
            const summaryEl = document.getElementById('summaryStats');
            summaryEl.innerHTML = `
                <div class="summary-card">
                    <div class="summary-label">Weighted APY</div>
                    <div class="summary-value">${weightedAPY.toFixed(2)}%</div>
                    <div class="summary-subtitle">Portfolio average</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Total Yearly Rewards</div>
                    <div class="summary-value">${totalYearlyRewards.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="summary-subtitle">ASTER per year</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Total Monthly</div>
                    <div class="summary-value">${(totalYearlyRewards / 12).toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="summary-subtitle">ASTER per month</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Final Balance (1 year)</div>
                    <div class="summary-value">${(totalAmount + totalYearlyRewards).toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="summary-subtitle">ASTER total</div>
                </div>
            `;
        }

        // Render charts
        function renderCharts(results) {
            const validResults = results.filter(r => r.percentage > 0);

            // Distribution Chart
            if (charts.distribution) {
                charts.distribution.destroy();
            }
            const distCtx = document.getElementById('distributionChart').getContext('2d');
            charts.distribution = new Chart(distCtx, {
                type: 'doughnut',
                data: {
                    labels: validResults.map(r => r.validator.name),
                    datasets: [{
                        data: validResults.map(r => r.percentage),
                        backgroundColor: [
                            '#14b8a6',
                            '#06b6d4',
                            '#8b5cf6',
                            '#f59e0b',
                            '#ef4444',
                            '#10b981'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#e2e8f0' }
                        },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    return `${context.label}: ${context.parsed}%`;
                                }
                            }
                        }
                    }
                }
            });

            // Rewards Chart
            if (charts.rewards) {
                charts.rewards.destroy();
            }
            const rewardsCtx = document.getElementById('rewardsChart').getContext('2d');
            charts.rewards = new Chart(rewardsCtx, {
                type: 'bar',
                data: {
                    labels: validResults.map(r => r.validator.name),
                    datasets: [{
                        label: 'Yearly Rewards',
                        data: validResults.map(r => r.rewards.yearly),
                        backgroundColor: '#14b8a6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    return `${context.parsed.y.toLocaleString('en-US')} ASTER/year`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Render comparison table
        function renderComparisonTable(results) {
            const validResults = results.filter(r => r.percentage > 0);
            const tableEl = document.getElementById('comparisonTable');
            
            tableEl.innerHTML = `
                <thead>
                    <tr>
                        <th>Validator</th>
                        <th>Allocation</th>
                        <th>Amount</th>
                        <th>APY</th>
                        <th>Yearly Rewards</th>
                        <th>Commission</th>
                    </tr>
                </thead>
                <tbody>
                    ${validResults.map(r => `
                        <tr>
                            <td>${r.validator.name}</td>
                            <td class="highlight">${r.percentage}%</td>
                            <td>${r.amount.toLocaleString('en-US', {maximumFractionDigits: 0})} ASTER</td>
                            <td class="highlight">${r.rewards.apy.toFixed(2)}%</td>
                            <td>${r.rewards.yearly.toLocaleString('en-US', {maximumFractionDigits: 0})} ASTER</td>
                            <td>${r.validator.commission}%</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
        }

        // Auto-optimize (equal distribution)
        function autoOptimize() {
            const numAllocations = allocations.length;
            const equalPercentage = 100 / numAllocations;
            
            allocations.forEach(a => {
                a.percentage = equalPercentage;
            });
            
            renderAllocations();
            calculate();
        }

        // Event listeners
        document.getElementById('totalAmount').addEventListener('input', calculate);

        // Initialize
        loadValidators();
    </script>
</body>
</html>
