# ═══════════════════════════════════════
# netlify.toml — astervalidators.com
# ═══════════════════════════════════════

[build]
  publish = "."

# ─── Security & Performance Headers ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://www.asterdex.com https://explorer.asterdex.com wss://chainstream.asterdex.com https://www.googletagmanager.com https://www.google-analytics.com"

# ─── Cache static assets ───
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── HTML (short cache for fresh data) ───
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"

# ─── Redirect total → asterscan.com ───
[[redirects]]
  from = "/*"
  to   = "https://aster-scan.com/:splat"
  status = 301
  force  = true
